<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" role="img" aria-label="AIGrowthly">
  <defs>
    <linearGradient id="agMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Mark: bold geometric "A" with upward growth chevron -->
  <g transform="translate(2,6)">
    <!-- Solid triangle A with crossbar -->
    <path d="M18 0 L36 36 L28 36 L24.4 28.4 L11.6 28.4 L8 36 L0 36 Z M14 22 L22 22 L18 13 Z"
          fill="url(#agMark)"/>
    <!-- Growth chevron accent (reads as an upward arrow/peak) -->
    <path d="M40 18 L46 10 L52 18"
          stroke="url(#agMark)" stroke-width="3"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark (single weight for clarity) -->
  <text x="68" y="32"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="22" letter-spacing="-0.5"
        fill="#f3f4f7">AIGrowthly</text>
</svg>
